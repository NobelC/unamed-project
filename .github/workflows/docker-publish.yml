# .github/workflows/ci.yml
name: HESTIA CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  # Solo construir imagen en tags de release
  release:
    types: [ published ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ═══════════════════════════════════════════════════════════
  # JOB 1: Validar que el backend C++20 compila y tests pasan
  # ═══════════════════════════════════════════════════════════
  test-backend:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git \
            gcc-13 g++-13 clang-18 \
            python3.12 python3.12-venv python3-pip

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  # ═══════════════════════════════════════════════════════════
  # JOB 2: Validar frontend Python (linting + tests básicos)
  # ═══════════════════════════════════════════════════════════
  test-frontend:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint with Ruff
        run: ruff check frontend/

      - name: Type check with Pyright
        run: python -m pyright frontend/

      - name: Run Python tests
        run: pytest frontend/tests/ -v --tb=short || echo "Tests de UI requieren entorno gráfico"

  # ═══════════════════════════════════════════════════════════
  # JOB 3: Construir imagen Docker (solo en releases)
  # ═══════════════════════════════════════════════════════════
  build-docker:
    runs-on: ubuntu-24.04
    needs: [ test-backend, test-frontend ]  # Solo construye si los tests pasan
    if: github.event_name == 'release'       # Solo en releases, no en cada push
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
